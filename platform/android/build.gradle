// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

def appProjectRoot = rootDir.parentFile.parentFile
def nativeProjectRootPath = rootDir.absolutePath

gradle.projectsEvaluated {
  project(':expo-constants').tasks.named('createExpoConfig').configure {
    workingDir appProjectRoot
    setCommandLine(commandLine.collect { argument ->
      argument.toString() == nativeProjectRootPath ? appProjectRoot.absolutePath : argument
    })
  }
}
